# ─────────────────────────────────────────────────────────────────
#  Render Blueprint – 2048 Game with AI Solver
#  Deploy via: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────────

services:
  - type: web
    name: 2048-game
    runtime: image
    repo: https://github.com/YOUR_USERNAME/2048-game   # ← Replace with your repo URL
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 5000
    healthCheckPath: /api/state
    autoDeploy: true